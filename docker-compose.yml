version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe_pass
      POSTGRES_DB: vibe_db
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql:ro
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgres://vibe:vibe_pass@db:5432/vibe_db
      JWT_SECRET: change_me
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db-data:
